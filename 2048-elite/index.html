<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Elite — Premium Puzzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header id="hud">
            <div class="brand">
                <h1>2048 <span>ELITE</span></h1>
            </div>
            <div class="scores">
                <div class="score-card">
                    <span class="label">SCORE</span>
                    <span id="score-val" class="value">0</span>
                    <div id="score-addition"></div>
                </div>
                <div class="score-card">
                    <span class="label">BEST</span>
                    <span id="best-val" class="value">0</span>
                </div>
            </div>
        </header>

        <nav id="actions">
            <button id="btn-undo" class="text-btn">UNDO</button>
            <button id="btn-new" class="text-btn">NEW GAME</button>
        </nav>

        <main id="game-container">
            <div id="board-perspective">
                <div id="board">
                    <!-- Grid markers -->
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                    
                    <!-- Dynamic Tiles Layer -->
                    <div id="tile-container"></div>
                </div>
            </div>
        </main>

        <footer id="footer">
            <p>Join the numbers and get to the <strong>2048 tile!</strong></p>
        </footer>

        <!-- Overlays -->
        <div id="game-over" class="overlay hidden">
            <div class="overlay-card glass">
                <h2 id="over-message">GAME OVER</h2>
                <div class="over-stats">
                    <p>Final Score: <span id="final-score">0</span></p>
                </div>
                <button id="btn-restart" class="primary-btn">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
